<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Counter Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <script src="../splash/globalsplash.js"></script>
  <div id="header-box"></div>

<div style="max-width:950px;margin:auto;background:linear-gradient(145deg,#ffffff,#f3f5ff);
border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.18);
font-family:'Poppins',sans-serif;border:1px solid rgba(255,255,255,0.3);">

<h2 style="margin-bottom:18px;font-weight:600;color:#1f1f1f;
letter-spacing:0.3px;">Advanced Text Counter</h2>

<button onclick="pasteText()" 
style="margin-bottom:14px;width:100%;border:none;border-radius:14px;padding:14px;
cursor:pointer;font-weight:600;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;font-size:14px;box-shadow:0 6px 20px rgba(102,126,234,0.4);">
📋 Paste Text
</button>

<textarea id="advanceWordcounter_textInput" placeholder="Paste your text here..." 
style="width:100%;height:160px;padding:14px;border-radius:16px;
border:1px solid #e4e6f1;margin:12px 0;resize:none;font-size:14px;
outline:none;background:#f9faff;
box-shadow:inset 0 2px 6px rgba(0,0,0,0.05);"></textarea>
<div style="margin-top:10px;">
  <input type="file" id="advanceWordcounter_imageInput" 
  accept="image/*" multiple style="display:none;" 
  onchange="handleImages(event)">

  <button onclick="document.getElementById('advanceWordcounter_imageInput').click()" 
  style="width:100%;border:none;border-radius:10px;padding:10px;
  cursor:pointer;font-weight:600;
  background:#eef1ff;color:#333;">
  Upload Images
  </button>
</div>

<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
<input id="advanceWordcounter_customInput" placeholder="Custom search pattern" 
style="flex:1;min-width:0;padding:12px;border-radius:12px;border:1px solid #ddd;
height:20px;font-size:13px;background:#f9faff;">

<button onclick="analyze()" 
style="width:160px;height:44px;flex-shrink:0;border:none;border-radius:12px;
padding:12px;cursor:pointer;font-weight:600;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;font-size:13px;box-shadow:0 5px 15px rgba(102,126,234,0.35);">
Analyze
</button>
</div>

<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
<input id="advanceWordcounter_replaceFrom" placeholder="Replace from" 
style="flex:1;min-width:0;padding:12px;border-radius:12px;border:1px solid #ddd;height:20px;background:#f9faff;">
<input id="advanceWordcounter_replaceTo" placeholder="Replace to" 
style="flex:1;min-width:0;padding:12px;border-radius:12px;border:1px solid #ddd;height:20px;background:#f9faff;">
<button onclick="doReplace()" 
style="width:160px;height:44px;flex-shrink:0;border:none;border-radius:12px;
padding:12px;cursor:pointer;font-weight:600;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;font-size:13px;box-shadow:0 5px 15px rgba(102,126,234,0.35);">
Replace
</button>
</div>

<div id="advanceWordcounter_outputArea" 
style="display:none;margin-top:14px;padding:14px;border-radius:16px;
background:#ffffff;border:1px solid #e6e8f5;
white-space:pre-wrap;max-height:220px;overflow:auto;
font-size:13px;line-height:1.6;
box-shadow:inset 0 2px 8px rgba(0,0,0,0.05);"></div>
<div id="resultControls" style="margin-top:10px;display:none;align-items:center;justify-content:space-between;gap:10px;">

  <img src="https://cdn-icons-png.flaticon.com/512/271/271220.png"
  onclick="undoResult()"
  style="width:30px;cursor:pointer;">

  <button onclick="copyOutput()" 
  style="flex:1;border:none;border-radius:10px;padding:10px;
  cursor:pointer;font-weight:600;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;">
  Copy
  </button>

  <img src="https://cdn-icons-png.flaticon.com/512/271/271228.png"
  onclick="redoResult()"
  style="width:30px;cursor:pointer;">

</div>

<!-- RESULT CARDS -->
<div id="advanceWordcounter_topCards" 
style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:14px;margin-top:20px;"></div>


<!-- DETAILS -->
<div id="advanceWordcounter_details" 
style="margin-top:20px;padding:16px;border-radius:16px;
background:linear-gradient(135deg,#f6f8ff,#eef1ff);
border:1px solid #e4e8ff;font-size:14px;color:#333;
box-shadow:0 6px 18px rgba(0,0,0,0.06);"></div>

<!-- CUSTOM HISTORY -->
<div id="advanceWordcounter_customResult" 
style="margin-top:20px;padding:16px;border-radius:16px;
background:linear-gradient(135deg,#f6f8ff,#eef1ff);
border:1px solid #e4e8ff;font-size:13px;color:#555;
box-shadow:0 6px 18px rgba(0,0,0,0.06);"></div>

</div>

<script>
let historyStack = [];
let historyIndex = -1;
let customList=[];

// ===== SAFE HTML ESCAPE =====
function escapeHTML(str){
  return str.replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[m]));
}

// ===== PASTE =====
async function pasteText(){
 try{
   const text = await navigator.clipboard.readText();
   document.getElementById("advanceWordcounter_textInput").value=text;
 }catch(e){
   alert("Clipboard blocked");
 }
}

// ===== REPLACE =====
function doReplace(){
  let textarea = document.getElementById("advanceWordcounter_textInput");

  let text = textarea.value;
  let from = document.getElementById("advanceWordcounter_replaceFrom").value;
  let to = document.getElementById("advanceWordcounter_replaceTo").value;

  if(!from){
    alert("Enter replace text");
    return;
  }

  // global replace
  let result = text.split(from).join(to);

  // ⭐ IMPORTANT FIX: textarea update karo
  textarea.value = result;

  let out = document.getElementById("advanceWordcounter_outputArea");
  out.style.display = "block";
  out.innerHTML = escapeHTML(result);

  saveHistory(result); // <-- CHANGE HERE
}

// ===== ANALYZE =====
function analyze(){
document.getElementById("advanceWordcounter_outputArea").style.display="none";
 const text=document.getElementById("advanceWordcounter_textInput").value;
 const custom=document.getElementById("advanceWordcounter_customInput").value;

 // ===== BASIC COUNTS =====
 let words=(text.trim().match(/\S+/g)||[]).length;
 let chars=text.length;
 let spaces=(text.match(/ /g)||[]).length;

 let lines=text.split("\n");
 let textLines=lines.filter(l=>l.trim()!="").length;
 let emptyLines=lines.filter(l=>l.trim()=="").length;

 let numTotal=(text.match(/[0-9]/g)||[]).length;
 let capTotal=(text.match(/[A-Z]/g)||[]).length;
 let smallTotal=(text.match(/[a-z]/g)||[]).length;

 // ===== TOP CARDS =====
 document.getElementById("advanceWordcounter_topCards").innerHTML=`
 <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:15px;">
   ${card(words,"Words")}
   ${card(chars,"Chars")}
   ${card(spaces,"Spaces")}
   ${card(textLines,"Text Lines")}
   ${card(emptyLines,"Empty Lines")}
 </div>
 `;

 function card(value,label){
   return `
   <div style="background:#fff;border-radius:14px;padding:14px;text-align:center;
   box-shadow:0 6px 18px rgba(0,0,0,0.08);">
     <div style="font-size:22px;font-weight:600;color:#333;">${value}</div>
     <div style="font-size:13px;color:#777;margin-top:4px;">${label}</div>
   </div>
   `;
 }

 // ===== DETAILS =====
 let numbersMap={}, capsMap={}, smallMap={}, symMap={};

 for(let i=0;i<=9;i++){
   let c=(text.match(new RegExp(i,'g'))||[]).length;
   if(c>0) numbersMap[i]=c;
 }

 for(let i=65;i<=90;i++){
   let ch=String.fromCharCode(i);
   let c=(text.match(new RegExp(ch,'g'))||[]).length;
   if(c>0) capsMap[ch]=c;
 }

 for(let i=97;i<=122;i++){
   let ch=String.fromCharCode(i);
   let c=(text.match(new RegExp(ch,'g'))||[]).length;
   if(c>0) smallMap[ch]=c;
 }

 let others=text.match(/[^a-zA-Z0-9\s]/g)||[];
 others.forEach(c=>symMap[c]=(symMap[c]||0)+1);

 function mapToChips(map){
   return Object.entries(map).map(([k,v])=>
     `<span style="background:#eef1ff;padding:4px 8px;border-radius:8px;margin:2px;display:inline-block;font-size:12px;">${k}=${v}</span>`
   ).join(" ");
 }

 document.getElementById("advanceWordcounter_details").innerHTML=`
 <div style="display:grid;gap:12px;">
   ${detailCard("Numbers", numTotal, mapToChips(numbersMap))}
   ${detailCard("Capital Letters", capTotal, mapToChips(capsMap))}
   ${detailCard("Small Letters", smallTotal, mapToChips(smallMap))}
   ${detailCard("Symbols", others.length, mapToChips(symMap))}
 </div>
 `;

 function detailCard(title,total,content){
   return `
   <div style="background:#fff;border-radius:14px;padding:14px;
   box-shadow:0 6px 18px rgba(0,0,0,0.08);">

     <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
       <div style="font-weight:600;color:#333;">${title}</div>
       <div style="font-size:14px;color:#667eea;font-weight:600;">${total}</div>
     </div>

     <div style="font-size:13px;color:#444;line-height:1.6;word-break:break-word;">
       ${content || "None"}
     </div>

   </div>
   `;
 }

 // ===== CUSTOM SEARCH (SAFE + HIGHLIGHT) =====
 if(custom && custom.trim() !== ""){

   let safeText = escapeHTML(text);

   let safeCustom = custom.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
   let regex = new RegExp(safeCustom, "gi");

   let highlighted = safeText.replace(regex,
     m => `<span style="background:red;color:#fff;padding:2px 4px;border-radius:4px;">${m}</span>`
   );

   let out=document.getElementById("advanceWordcounter_outputArea");
out.style.display="block";
out.innerHTML = highlighted;
document.getElementById("resultControls").style.display = "flex";

saveHistory(highlighted);

   let count=(text.match(regex)||[]).length;

   let foundIndex = customList.findIndex(item => item.startsWith(custom + " :"));

   if(foundIndex !== -1){
     customList[foundIndex] = custom + " : " + count;
   } else {
     customList.push(custom + " : " + count);
   }
 }

 // ===== HISTORY =====
 document.getElementById("advanceWordcounter_customResult").innerHTML=`
 <div style="background:#fff;border-radius:14px;padding:14px;
 box-shadow:0 6px 18px rgba(0,0,0,0.08);">

   <div style="font-weight:600;margin-bottom:8px;color:#333;">Custom History</div>

   <div style="font-size:13px;color:#555;line-height:1.6;">
   ${customList.length ? customList.join("<br>") : "No searches yet"}
   </div>

 </div>
 `;
}

function copyOutput(){
  let text = document.getElementById("advanceWordcounter_outputArea").innerText;

  navigator.clipboard.writeText(text)
    .then(() => alert("Copied!"))
    .catch(() => alert("Copy failed"));
}
async function handleImages(event){
  const files = Array.from(event.target.files);

  if(files.length > 50){
  alert("Max 50 images allowed (performance issue)");
  return;
}

  let inputBox = document.getElementById("advanceWordcounter_textInput");

  inputBox.value = "Processing images...\n";

  let finalText = "";

  for(let i=0;i<files.length;i++){
    let file = files[i];

    try{
      const result = await Tesseract.recognize(
        file,
        'eng',
        {
          logger: m => console.log(m)
        }
      );

      finalText += result.data.text + "\n\n";

      // live update
      inputBox.value = `Processing ${i+1}/${files.length} images...\n\n` + finalText;

    }catch(err){
      console.error(err);
    }
  }

  inputBox.value = finalText.trim();
}
function saveHistory(content){
  const box = document.getElementById("advanceWordcounter_outputArea");

  // agar same content hai to skip
  if(historyStack[historyIndex] === content) return;

  // forward history delete (IMPORTANT FIX)
  historyStack = historyStack.slice(0, historyIndex + 1);

  historyStack.push(content);
  historyIndex++;

  box.style.display = "block";
}
function undoResult(){
  if(historyIndex > 0){
    historyIndex--;
    document.getElementById("advanceWordcounter_outputArea").innerHTML = historyStack[historyIndex];
  }
}
function redoResult(){
  if(historyIndex < historyStack.length - 1){
    historyIndex++;
    document.getElementById("advanceWordcounter_outputArea").innerHTML =
      historyStack[historyIndex];
  }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
fetch('../home/universalheader.html')
.then(res => res.text())
.then(data=>{
document.getElementById("header-box").innerHTML=data;
});
</script>
</body>
</html>
